name: Remover Access Widener

on:
  workflow_dispatch:   # Execução manual apenas

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Eliminar access widener
        run: |
          echo "🔍 Procurando ficheiros .accesswidener..."
          find src/main/resources -name "*.accesswidener" -type f -print -delete
          echo "✅ Ficheiros removidos (se existiam)."

      - name: Commit das alterações (opcional)
        if: false   # Mude para 'true' se quiser que o workflow faça commit automaticamente
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "🧹 Remover ficheiros access widener inválidos" || echo "Nada para commit"
          git push
